name: Devops demo pipline

on:
    push:
        branches:
            - main

jobs:
    runner-info:
        runs-on: ubuntu-latest

        steps:
            - name: CheckOut
              uses: action/checkout@v4

            - name: Print working Directory
              run: pwd

            - name: List Project files
              run: ls -la

            - name: Show git status
              run: git status

            - name: Show README
              run: cat README.md
