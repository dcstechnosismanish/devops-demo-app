name: DevOps Demo CI Pipeline

on:
    push:
        branches:
            - main

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install Dependencies
              run: npm ci

            - name: Check Node Version
              run: node -v

            - name: Check NPM Version
              run: npm -v

            - name: Verify Express Installation
              run: npm list express

    test:
        needs: lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install Dependencies
              run: npm ci

            - name: Run Tests
              run: npm test

    build:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install Dependencies
              run: npm ci

            - name: Show Installed Packages
              run: npm list

            - name: Read Secret
              env:
                  OWNER: ${{ secrets.APP_OWNER }}
              run: |
                  echo "Repository Owner: $OWNER"
