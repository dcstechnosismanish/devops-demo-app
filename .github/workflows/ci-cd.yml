name: DevOps Demo CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache NPM Package
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Check Node Version
        run: node -v

      - name: Check NPM Version
        run: npm -v

      - name: Verify Express Installation
        run: npm list express

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Show Installed Packages
        run: npm list

      - name: Read Secret
        env:
          OWNER: ${{ secrets.APP_OWNER }}
        run: |
          echo "Repository Owner: $OWNER"

      - name: Create Build Folder
        run: |
          mkdir output
          echo "DevOps Demo App Build Successful" > output/build.txt

      - name: Show Build Folder
        run: ls -R output

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: devops-build
          path: output/

      - name: Build Docker image
        run: |
          docker build -t devops-demo-app:${{ github.sha }} .

      - name: List Docker Image
        run: docker image

      - name: Login to Docker HUb
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN}}

      - name: Tag Docker Image
        run: |
          docker tag devops-demo-app:${{ github.sha }} mannu0/devops-demo-app:latest
          docker tag devops-demo-app:${{ github.sha }} mannu0/devops-demo-app:${{ github.sha }}

      - name: Push latest Image
        run: docker push mannu0/devops-demo-app:latest

      - name: Push Commit Image
        run: docker push mannu0/devops-demo-app:${{ github.sha }}

  download-artifact:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: devops-build

      - name: Show Downloaded Files
        run: ls -R

      - name: Read Artifact File
        run: cat build.txt
